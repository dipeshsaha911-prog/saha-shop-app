  <!-- Bubbles in wine -->
  <circle cx="230" cy="260" r="5" fill="#c8556e" opacity="0.6"/>
  <circle cx="270" cy="240" r="4" fill="#c8556e" opacity="0.5"/>
  <circle cx="250" cy="280" r="3" fill="#c8556e" opacity="0.4"/>

