<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a0a0f"/>

  <!-- Decorative circle -->
  <circle cx="256" cy="256" r="200" fill="#2d0d1a" opacity="0.6"/>

  <!-- Wine glass stem -->
  <rect x="238" y="330" width="36" height="100" rx="8" fill="#c8a96e"/>

  <!-- Wine glass base -->
  <ellipse cx="256" cy="430" rx="70" ry="14" fill="#c8a96e"/>

  <!-- Wine glass bowl outline -->
  <path d="M156 130 Q140 230 200 290 Q228 318 256 320 Q284 318 312 290 Q372 230 356 130 Z" fill="#7B2D42" stroke="#c8a96e" stroke-width="4"/>

  <!-- Wine liquid fill -->
  <path d="M168 200 Q160 250 200 285 Q228 312 256 314 Q284 312 312 285 Q352 250 344 200 Z" fill="#9B1D42"/>

  <!-- Wine highlight/shine -->
